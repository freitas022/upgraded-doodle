spring:
  application:
    name: upgraded-doodle

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/upgraded-doodle-app}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:password}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
payment:
  mock:
    enabled: true