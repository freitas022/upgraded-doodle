services:
  postgres-db:
    image: postgres:15-alpine
    container_name: db
    environment:
      - POSTGRES_DB=upgraded-doodle-app
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
    ports:
      - "5432:5432"
    volumes:
      - pg_spring_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pg_spring_data:
    driver: local
